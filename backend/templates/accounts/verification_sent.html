{% extends 'base.html' %}

{% block title %}Check Your Email - PrintHub{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-20 text-center">
    <div class="bg-white/5 border border-white/10 backdrop-blur-md rounded-3xl p-8">
        <div class="w-16 h-16 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            </svg>
        </div>
        <h1 class="text-3xl font-bold text-white mb-4">Check Your Email</h1>
        <p class="text-gray-400 mb-4">We sent a verification link to your email address.</p>
        <p class="text-gray-500 text-sm mb-8">Click the link in the email to activate your account, then log in.</p>
        <a href="{% url 'login' %}" class="text-blue-400 hover:text-blue-300 font-semibold">Back to Login</a>
    </div>
</div>
{% endblock %}
